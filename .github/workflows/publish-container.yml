name: Publish Container
on:
  push:
    branches:
      - main
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  pull_request:
  schedule:
    - cron: "0 0 * * 0"

jobs:
  publish:
    name: Publish rfd-fyi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Frontend unit tests with coverage
        run: |
          npm ci
          npm run test:coverage

      - name: Coverage summary
        if: success()
        run: |
          node <<'NODE'
          const fs = require("fs");
          const summaryPath = "coverage/coverage-summary.json";
          if (!fs.existsSync(summaryPath)) {
            console.warn("coverage/coverage-summary.json missing");
            process.exit(0);
          }
          const { total } = JSON.parse(fs.readFileSync(summaryPath, "utf8"));
          const row = (label, m) => `| ${label} | ${m.pct}% (${m.covered}/${m.total}) |`;
          const md = [
            "## Frontend coverage",
            "",
            "| Metric | Coverage |",
            "| --- | --- |",
            row("Statements", total.statements),
            row("Branches", total.branches),
            row("Functions", total.functions),
            row("Lines", total.lines),
            "",
            "Download the **coverage-report** artifact for the HTML report.",
            "",
          ].join("\n");
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, md);
          NODE

      - name: Upload coverage report
        if: success()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-report
          path: coverage/

      - name: Prepare
        id: prep
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/rfd-fyi
          VERSION=${GITHUB_REF##*/}
          if [[ $GITHUB_REF == refs/heads/main ]]; then
            VERSION=latest
          fi
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          TAGS="${IMAGE_NAME}:${VERSION}"
          if [[ $VERSION =~ ^[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}$ ]]; then
            TAGS="$TAGS,${IMAGE_NAME}:latest"
          fi
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Login to GitHub Packages Docker Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build / push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
          tags: ${{ steps.prep.outputs.tags }}
